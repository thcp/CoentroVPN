mode = "server"
server_addr = "127.0.0.1"
listen_addr = "0.0.0.0"
listen_port = 1193

[logging]
format = "json"   # or "pretty"
log_level = "info"  # Possible values: "debug", "info", "error", etc.

[observability]
metrics_addr = "127.0.0.1:9100"  # Address for metrics server
health_addr = "127.0.0.1:8080"   # Address for health server
enable_metrics = true            # Enable or disable metrics collection

[compression]
algorithm = "gzip"               # Algorithm to use for compression (e.g., "gzip", "zstd")
min_compression_size = 512       # Minimum size (in bytes) for payloads to be compressed

[udp]
mtu = 1500                       # Maximum Transmission Unit (MTU)
buffer_size = 8192               # Default buffer size
rate_limit = 1000                # Rate limit in bytes per second
max_packet_size = 1400           # Safe packet size considering typical MTU and headers
flow_control_threshold = 500     # Flow control threshold (in bytes)
recv_buffer_size = 1048576       # OS-level receive buffer size (in bytes)
send_buffer_size = 1048576       # OS-level send buffer size (in bytes)
enable_mtu_discovery = true      # Enable dynamic MTU path discovery